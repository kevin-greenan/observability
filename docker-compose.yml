services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-latest}
    container_name: lgtm-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_DEFAULT_THEME: system
    ports:
      - "${GRAFANA_HTTP_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_HTTP_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./dashboards/grafana:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - tempo
      - mimir
    networks:
      - observability

  loki:
    image: grafana/loki:${LOKI_VERSION:-latest}
    container_name: lgtm-loki
    restart: unless-stopped
    command:
      - -config.file=/etc/loki/loki.yaml
    ports:
      - "${LOKI_HTTP_BIND_ADDRESS:-127.0.0.1}:${LOKI_HTTP_PORT:-3100}:3100"
    volumes:
      - ./config/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ./detections/loki:/loki/rules/fake:ro
      - loki-data:/loki
    networks:
      - observability

  tempo:
    image: grafana/tempo:${TEMPO_VERSION:-latest}
    container_name: lgtm-tempo
    restart: unless-stopped
    command:
      - -config.file=/etc/tempo/tempo.yaml
    ports:
      - "${TEMPO_HTTP_BIND_ADDRESS:-127.0.0.1}:${TEMPO_HTTP_PORT:-3200}:3200"
      - "${TEMPO_OTLP_GRPC_BIND_ADDRESS:-127.0.0.1}:${TEMPO_OTLP_GRPC_PORT:-4317}:4317"
      - "${TEMPO_OTLP_HTTP_BIND_ADDRESS:-127.0.0.1}:${TEMPO_OTLP_HTTP_PORT:-4318}:4318"
    volumes:
      - ./config/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/var/tempo
    networks:
      - observability

  mimir:
    image: grafana/mimir:${MIMIR_VERSION:-latest}
    container_name: lgtm-mimir
    restart: unless-stopped
    command:
      - -config.file=/etc/mimir/mimir.yaml
    ports:
      - "${MIMIR_HTTP_BIND_ADDRESS:-127.0.0.1}:${MIMIR_HTTP_PORT:-9009}:9009"
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data
    networks:
      - observability

  prometheus:
    image: prom/prometheus:${PROMETHEUS_VERSION:-latest}
    container_name: lgtm-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yaml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_HTTP_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_HTTP_PORT:-9090}:9090"
    volumes:
      - ./config/prometheus/prometheus.yaml:/etc/prometheus/prometheus.yaml:ro
      - prometheus-data:/prometheus
    depends_on:
      - mimir
    networks:
      - observability

  alloy:
    image: grafana/alloy:${ALLOY_VERSION:-latest}
    container_name: lgtm-alloy
    restart: unless-stopped
    command:
      - run
      - /etc/alloy/config.alloy
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
    ports:
      - "${ALLOY_HTTP_BIND_ADDRESS:-127.0.0.1}:${ALLOY_HTTP_PORT:-12345}:12345"
    volumes:
      - ./config/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - alloy-data:/var/lib/alloy/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
      - mimir
    networks:
      - observability

  siem-collector:
    image: timberio/vector:${VECTOR_VERSION:-0.49.0-debian}
    container_name: lgtm-siem-collector
    restart: unless-stopped
    command:
      - --config
      - /etc/vector/vector.yaml
    ports:
      - "${SIEM_COLLECTOR_HTTP_BIND_ADDRESS:-127.0.0.1}:${SIEM_COLLECTOR_HTTP_PORT:-8686}:8686"
      - "${SIEM_COLLECTOR_METRICS_BIND_ADDRESS:-127.0.0.1}:${SIEM_COLLECTOR_METRICS_PORT:-9598}:9598"
      - "${SIEM_HTTP_EVENT_BIND_ADDRESS:-127.0.0.1}:${SIEM_HTTP_EVENT_PORT:-8088}:8088"
      - "${SIEM_SYSLOG_TCP_BIND_ADDRESS:-127.0.0.1}:${SIEM_SYSLOG_TCP_PORT:-5514}:5514/tcp"
      - "${SIEM_SYSLOG_UDP_BIND_ADDRESS:-127.0.0.1}:${SIEM_SYSLOG_UDP_PORT:-5514}:5514/udp"
    environment:
      SIEM_HTTP_EVENT_TOKEN: ${SIEM_HTTP_EVENT_TOKEN:-change-me}
    volumes:
      - ./config/vector/vector.yaml:/etc/vector/vector.yaml:ro
      - ./config/vector/lookups:/etc/vector/lookups:ro
      - ${SIEM_INGEST_DIR:-./ingest}:/var/lib/siem/ingest:ro
      - vector-data:/var/lib/vector
    depends_on:
      - loki
    networks:
      - observability

  edge-proxy:
    image: caddy:${CADDY_VERSION:-2-alpine}
    container_name: lgtm-edge-proxy
    restart: unless-stopped
    profiles:
      - edge
    ports:
      - "${SIEM_EDGE_HTTPS_BIND_ADDRESS:-0.0.0.0}:${SIEM_EDGE_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./config/proxy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - grafana
      - siem-collector
    networks:
      - observability

  log-generator:
    image: busybox:${BUSYBOX_VERSION:-latest}
    container_name: lgtm-log-generator
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        while true; do
          echo "{\"service\":\"log-generator\",\"level\":\"info\",\"message\":\"synthetic application event\",\"ts\":\"$$(date -Iseconds)\"}";
          sleep 5;
        done
    networks:
      - observability

  trace-generator:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:${TELEMETRYGEN_VERSION:-latest}
    container_name: lgtm-trace-generator
    restart: unless-stopped
    command:
      - traces
      - --otlp-endpoint=tempo:4317
      - --otlp-insecure
      - --rate=1
      - --duration=inf
    depends_on:
      - tempo
    networks:
      - observability

networks:
  observability:
    name: lgtm-observability

volumes:
  grafana-data:
  loki-data:
  tempo-data:
  mimir-data:
  prometheus-data:
  alloy-data:
  vector-data:
  caddy-data:
  caddy-config:
