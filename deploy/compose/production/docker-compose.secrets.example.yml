# Example production-style secret override.
#
# Copy this pattern into environment-specific deployment automation rather than
# committing real secret files. The referenced files are intentionally local
# placeholders for single-host Compose pilots.

services:
  grafana:
    environment:
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET__FILE: /run/secrets/grafana_oauth_client_secret
    secrets:
      - grafana_admin_password
      - grafana_oauth_client_secret

  siem-collector:
    entrypoint:
      - /bin/sh
      - -ec
    command:
      - |
        export SIEM_HTTP_EVENT_TOKEN="$$(cat /run/secrets/siem_http_event_token)"
        exec vector --config /etc/vector/vector.yaml
    secrets:
      - siem_http_event_token

secrets:
  grafana_admin_password:
    file: ./secrets/grafana_admin_password
  grafana_oauth_client_secret:
    file: ./secrets/grafana_oauth_client_secret
  siem_http_event_token:
    file: ./secrets/siem_http_event_token
