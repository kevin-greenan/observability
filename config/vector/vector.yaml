api:
  enabled: true
  address: 0.0.0.0:8686

data_dir: /var/lib/vector

enrichment_tables:
  asset_inventory:
    type: file
    file:
      path: /etc/vector/lookups/assets.csv
      encoding:
        type: csv
        include_headers: true
    schema:
      ip: string
      asset_name: string
      owner: string
      environment: string
      criticality: string

  source_inventory:
    type: file
    file:
      path: /etc/vector/lookups/sources.csv
      encoding:
        type: csv
        include_headers: true
    schema:
      source_type: string
      source_id: string
      display_name: string
      owner: string
      environment: string
      criticality: string
      expected_daily_events: string
      stale_after_minutes: string
      parser_expectation: string
      enrichment_required: string

sources:
  internal_metrics:
    type: internal_metrics

  siem_files:
    type: file
    include:
      - /var/lib/siem/ingest/**/*.log
      - /var/lib/siem/ingest/**/*.json
      - /var/lib/siem/ingest/**/*.jsonl
      - /var/lib/siem/ingest/**/*.csv
      - /var/lib/siem/ingest/**/*.txt
    read_from: beginning
    fingerprint:
      strategy: device_and_inode

  siem_syslog_tcp:
    type: syslog
    address: 0.0.0.0:5514
    mode: tcp
    max_length: 102400

  siem_syslog_udp:
    type: syslog
    address: 0.0.0.0:5514
    mode: udp
    max_length: 102400

  siem_http_event_collector:
    type: http_server
    address: 0.0.0.0:8088
    method: POST
    path: /
    strict_path: false
    auth:
      strategy: custom
      source: '.headers.authorization == "Bearer ${SIEM_HTTP_EVENT_TOKEN}"'
    decoding:
      codec: json

transforms:
  siem_normalize:
    type: remap
    inputs:
      - siem_files
      - siem_syslog_tcp
      - siem_syslog_udp
      - siem_http_event_collector
    source: |
      source_type = to_string(.source_type) ?? "unknown"
      if source_type == "http_server" {
        source_type = "http_event_collector"
      }

      raw = if exists(.message) {
        to_string(.message) ?? encode_json(.message)
      } else if exists(.event) {
        encode_json(.event)
      } else {
        encode_json(.)
      }
      path = to_string(.file) ?? "unknown"

      .message = raw
      .event = {}
      .event.kind = "event"
      .event.category = "security"
      .event.original = raw

      .observer = {}
      .observer.type = "siem-file-collector"
      .observer.vendor = "local"

      .siem = {}
      .siem.source_type = source_type
      .siem.ingest_path = path
      .siem.parser_mode = "raw-first"
      .siem.schema_version = "1"

      source_record, source_err = get_enrichment_table_record("source_inventory", {"source_type": source_type})
      if source_err == null {
        .siem.source_id = source_record.source_id
        .siem.source_name = source_record.display_name
        .siem.source_owner = source_record.owner
        .siem.source_environment = source_record.environment
        .siem.source_criticality = source_record.criticality
        .siem.source_expected_daily_events = source_record.expected_daily_events
        .siem.source_stale_after_minutes = source_record.stale_after_minutes
        .siem.source_parser_expectation = source_record.parser_expectation
        .siem.source_enrichment_required = source_record.enrichment_required
      } else {
        .siem.source_id = source_type
        .siem.source_name = source_type
        .siem.source_owner = "unknown"
        .siem.source_environment = "unknown"
        .siem.source_criticality = "unknown"
      }

      parsed_json, json_err = parse_json(raw)
      if json_err == null && is_object(parsed_json) {
        . = merge!(., parsed_json)
        .siem.parse_status = "json"
      } else if ends_with(path, ".csv") {
        parsed_csv, csv_err = parse_csv(raw)
        if csv_err == null && is_array(parsed_csv) {
          .csv = {}
          .csv.fields = parsed_csv
          .siem.parse_status = "csv"
        } else {
          .siem.parse_status = "raw"
        }
      } else if contains(raw, "=") {
        parsed_kv, kv_err = parse_key_value(raw)
        if kv_err == null && is_object(parsed_kv) {
          . = merge(., parsed_kv)
          .siem.parse_status = "key_value"
        } else {
          .siem.parse_status = "raw"
        }
      } else {
        .siem.parse_status = "raw"
      }

      .event = {}
      .event.kind = "event"
      .event.category = "security"
      .event.original = raw

      canonical_action = ""
      if exists(.event_action) {
        canonical_action = to_string(.event_action) ?? ""
      }
      if canonical_action == "" && exists(.action) {
        canonical_action = to_string(.action) ?? ""
      }
      if canonical_action != "" {
        . = merge(., {"event.action": canonical_action})
      }

      canonical_outcome = ""
      if exists(.event_outcome) {
        canonical_outcome = to_string(.event_outcome) ?? ""
      }
      if canonical_outcome == "" && exists(.outcome) {
        canonical_outcome = to_string(.outcome) ?? ""
      }
      if canonical_outcome == "" && exists(.result) {
        canonical_outcome = to_string(.result) ?? ""
      }
      if canonical_outcome != "" {
        . = merge(., {"event.outcome": canonical_outcome})
      }

      canonical_user = ""
      if exists(.user_name) {
        canonical_user = to_string(.user_name) ?? ""
      }
      if canonical_user == "" && exists(.username) {
        canonical_user = to_string(.username) ?? ""
      }
      if canonical_user == "" && exists(.user) {
        canonical_user = to_string(.user) ?? ""
      }
      if canonical_user != "" {
        . = merge(., {"user.name": canonical_user})
      }

      canonical_source_ip = ""
      if exists(.source_ip) {
        canonical_source_ip = to_string(.source_ip) ?? ""
      }
      if canonical_source_ip == "" && exists(.src_ip) {
        canonical_source_ip = to_string(.src_ip) ?? ""
      }
      if canonical_source_ip == "" && exists(.client_ip) {
        canonical_source_ip = to_string(.client_ip) ?? ""
      }
      if canonical_source_ip != "" {
        . = merge(., {"source.ip": canonical_source_ip})
      }

      canonical_destination_ip = ""
      if exists(.destination_ip) {
        canonical_destination_ip = to_string(.destination_ip) ?? ""
      }
      if canonical_destination_ip == "" && exists(.dest_ip) {
        canonical_destination_ip = to_string(.dest_ip) ?? ""
      }
      if canonical_destination_ip == "" && exists(.dst_ip) {
        canonical_destination_ip = to_string(.dst_ip) ?? ""
      }
      if canonical_destination_ip != "" {
        . = merge(., {"destination.ip": canonical_destination_ip})
      }

      canonical_destination_port = ""
      if exists(.destination_port) {
        canonical_destination_port = to_string(.destination_port) ?? ""
      }
      if canonical_destination_port == "" && exists(.dest_port) {
        canonical_destination_port = to_string(.dest_port) ?? ""
      }
      if canonical_destination_port == "" && exists(.dst_port) {
        canonical_destination_port = to_string(.dst_port) ?? ""
      }
      if canonical_destination_port != "" {
        . = merge(., {"destination.port": canonical_destination_port})
      }

      canonical_host = ""
      if exists(.host_name) {
        canonical_host = to_string(.host_name) ?? ""
      }
      if canonical_host == "" && exists(.hostname) {
        canonical_host = to_string(.hostname) ?? ""
      }
      if canonical_host == "" && exists(.host) {
        canonical_host = to_string(.host) ?? ""
      }
      if canonical_host != "" {
        . = merge(., {"host.name": canonical_host})
      }

      canonical_process = ""
      if exists(.process_name) {
        canonical_process = to_string(.process_name) ?? ""
      }
      if canonical_process == "" && exists(.process) {
        canonical_process = to_string(.process) ?? ""
      }
      if canonical_process != "" {
        . = merge(., {"process.name": canonical_process})
      }

      canonical_command_line = ""
      if exists(.process_command_line) {
        canonical_command_line = to_string(.process_command_line) ?? ""
      }
      if canonical_command_line == "" && exists(.command_line) {
        canonical_command_line = to_string(.command_line) ?? ""
      }
      if canonical_command_line == "" && exists(.cmdline) {
        canonical_command_line = to_string(.cmdline) ?? ""
      }
      if canonical_command_line == "" && exists(.cmd) {
        canonical_command_line = to_string(.cmd) ?? ""
      }
      if canonical_command_line == "" && exists(.command) {
        canonical_command_line = to_string(.command) ?? ""
      }
      if canonical_command_line != "" {
        . = merge(., {"process.command_line": canonical_command_line})
      }

      canonical_transport = ""
      if exists(.network_transport) {
        canonical_transport = to_string(.network_transport) ?? ""
      }
      if canonical_transport == "" && exists(.transport) {
        canonical_transport = to_string(.transport) ?? ""
      }
      if canonical_transport == "" && exists(.proto) {
        canonical_transport = to_string(.proto) ?? ""
      }
      if canonical_transport == "" && exists(.protocol) {
        canonical_transport = to_string(.protocol) ?? ""
      }
      if canonical_transport != "" {
        . = merge(., {"network.transport": downcase(canonical_transport)})
      }

      .source_type = source_type

      candidate_ip = to_string(get(., ["source.ip"]) ?? "") ?? ""
      if candidate_ip != "" {
        asset, asset_err = get_enrichment_table_record("asset_inventory", {"ip": candidate_ip})
        if asset_err == null {
          .asset = {}
          .asset.ip = candidate_ip
          .asset.name = asset.asset_name
          .asset.owner = asset.owner
          .asset.environment = asset.environment
          .asset.criticality = asset.criticality
          .siem.enrichment_status = "asset_inventory"
        } else {
          .siem.enrichment_status = "none"
        }
      } else {
        .siem.enrichment_status = "none"
      }

sinks:
  prometheus_metrics:
    type: prometheus_exporter
    inputs:
      - internal_metrics
    address: 0.0.0.0:9598

  loki:
    type: loki
    inputs:
      - siem_normalize
    endpoint: http://loki:3100
    healthcheck:
      enabled: false
    encoding:
      codec: json
    labels:
      job: siem-file-collector
      source_type: "{{ siem.source_type }}"
      source_id: "{{ siem.source_id }}"
      parse_status: "{{ siem.parse_status }}"
